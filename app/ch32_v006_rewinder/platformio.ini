[platformio]
boards_dir = boards

[env:rewinder]
platform = ch32v
board = genericCH32V006F8U6
board_build.ldscript = src/Link.ld
upload_protocol = minichlink
debug_tool = minichlink
monitor_speed = 115200

build_flags =
  -DCH32V00X=1
  -DCH32V006=1
  -DENABLE_SDI_LOG=1
  -Isrc
  -Isrc/Peripheral/inc

build_src_filter =
  +<main.c>
  +<debug.c>
  +<startup_ch32v00X.S>
  +<core_riscv.c>
  +<system_ch32v00X.c>
  +<lib/pcf8574_sw_i2c.c>
  +<Peripheral/src/ch32v00X_gpio.c>
  +<Peripheral/src/ch32v00X_rcc.c>
  +<Peripheral/src/ch32v00X_usart.c>
  +<Peripheral/src/ch32v00X_misc.c>
  +<Peripheral/src/ch32v00X_flash.c>

