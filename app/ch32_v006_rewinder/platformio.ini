  +<Peripheral/src/ch32v00X_usart.c>
  +<Peripheral/src/ch32v00X_misc.c>

[env:clear_iap_flag]
; Clears the IAP magic word so next power-on stays in IAP.
; Flash via WCH-LinkE to 0x08002000 (keeps bootloader), then jump-app.
platform = ch32v
board = genericCH32V006F8U6
board_build.ldscript = src/AppLink.ld
upload_protocol = minichlink
debug_tool = minichlink

build_flags =
  -DCH32V00X=1
  -DCH32V006=1
  -Isrc
  -Isrc/Peripheral/inc

build_src_filter =
  +<main_clear_iap_flag.c>
  +<startup_ch32v00X.S>
  +<core_riscv.c>
  +<system_ch32v00X.c>
  +<Peripheral/src/ch32v00X_gpio.c>
  +<Peripheral/src/ch32v00X_rcc.c>
  +<Peripheral/src/ch32v00X_misc.c>

[env:rs485_echo_test_iap]
; Flash via IAP only — requires bootloader at 0x08000000
; Build: pio run -e rs485_echo_test_iap
; Upload: python3 tools/ch32v006_rs485_iap.py --port <port> upload .pio/build/rs485_echo_test_iap/firmware.bin
platform = ch32v
board = genericCH32V006F8U6
board_build.ldscript = src/AppLink.ld
upload_protocol = minichlink
debug_tool = minichlink
monitor_speed = 115200

build_flags =
  -DCH32V00X=1
  -DCH32V006=1
  -Isrc
  -Isrc/Peripheral/inc

build_src_filter =
  +<main_rs485_echo_test.c>
